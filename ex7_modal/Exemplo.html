<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercício 7 - Modal Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <!-- Container principal -->
    <div class="container mt-5 text-center">
        <h2>Exemplo de Modal com Bootstrap</h2>

        <!-- Botão de acionamento -->
        <button type="button" class="btn btn-primary mt-3"
            data-bs-toggle="modal"
            data-bs-target="#exemploModal">
            Abrir Modal
        </button>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="exemploModal" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <!-- Header -->
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Título do Modal</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <!-- Body -->
                <div class="modal-body">
                    <p>Este é o conteúdo principal do modal.</p>
                    <p>Você pode adicionar textos, formulários ou qualquer elemento HTML aqui.</p>
                </div>

                <!-- Footer -->
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Fechar
                    </button>
                    <button type="button" class="btn btn-primary">
                        Salvar alterações
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
